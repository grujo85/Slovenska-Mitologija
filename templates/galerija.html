<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Mitoloska Riznica</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Kelly+Slab&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>

<div class="layout">
    <!-- LEVA STRANA: Pretraga i Lista -->
    <aside class="sidebar">
        <div class="search-section">
			<div class="logo-container">
				<img src="/static/slike/naslov_lat.png" alt="Slovenska Mitologija" class="main-logo">
			</div>
			<div style="padding: 0 0 15px 0;">
                <a href="/arena" style="text-decoration: none;">
                    <button style="width: 100%; background: #d4af37; color: black; font-weight: bold; border: 1px solid gold; padding: 12px; cursor: pointer; border-radius: 5px; font-family: 'Kelly Slab', serif; font-size: 1.1em; transition: 0.3s;">
                        ⚔️ UĐI U ARENU
                    </button>
                </a>
            </div>
            <!-- DODATO: id="live-search" i onkeyup poziv -->
            <input type="text" id="live-search" class="search-input" 
                   placeholder="Pretraži (latinica/ćirilica)..." 
                   onkeyup="filtrirajBica()">
        </div>
        
        <div class="creature-list" id="lista-bica">
            {% for bice in bica %}
            <!-- DODATO: data-ime atribut za pretragu -->
            <div class="creature-item" 
                 data-ime="{{ bice.ime }}"
                 onclick="prikaziDetalje('{{ bice.ime }}', `{{ bice.opis }}`, '{{ bice.slika }}', '{{ bice.kategorija }}', '{{ bice.opasnost }}', this)">
                <span class="name">{{ bice.ime }}</span>
                <span class="category">{{ bice.kategorija }}</span>
            </div>
            {% endfor %}
        </div>
    </aside>

    <main class="content-area">
		<button class="back-btn" onclick="vratiListu()">
    		⬅ NAZAD NA LISTU
		</button>

		<script>
			function vratiListu() {
    			document.body.classList.remove('detalji-aktivni');
    			document.querySelector('.sidebar').style.display = 'flex'; // Vraćamo listu
			}
		</script>
        <div id="empty-state" class="center-msg">
            <h1>✦ DREVNI GRIMOAR ✦</h1>
            <p>Izaberi zapis iz indeksa sa leve strane...</p>
        </div>

        <div id="details-card" class="book-page" style="display: none;">
    <div class="image-box">
        <img id="view-img" src="" alt="Slika bića">
    </div>
    <div class="text-box">
        <h1 id="view-name"></h1>
        <div class="meta">
            <strong>Kategorija:</strong> <span id="view-cat"></span> | 
            <strong>Opasnost:</strong> <span id="view-danger"></span>/10
        </div>
        <hr>
        <!-- BITNO: view-desc mora biti unutar desc-scroll -->
        <div class="desc-scroll">
            <div id="view-desc"></div>
        </div>
    </div>
</div></main> </div> 

<script>
// Tvoja postojeća funkcija za prikaz
function prikaziDetalje(ime, opis, slika, kategorija, opasnost, element) {
	// DODAJ OVU LINIJU: Dodaje klasu na body koja pokreće CSS sakrivanje
    // 1. Dodajemo klasu za CSS
    document.body.classList.add('detalji-aktivni');

    // 2. BRUTALNA METODA: Direktno sakrivanje ako je ekran mali
    if (window.innerWidth <= 768) {
        document.querySelector('.sidebar').style.display = 'none';
    }
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('details-card').style.display = 'flex';
    document.getElementById('view-name').innerText = ime;
    
    // Generisanje pasusa
    const descContainer = document.getElementById('view-desc');
    descContainer.innerHTML = opis.split('\n').map(p => `<p>${p}</p>`).join('');
    
    // DODAJ OVO: Resetuje skrol na vrh stranice knjige
    document.querySelector('.desc-scroll').scrollTop = 0;

    document.getElementById('view-cat').innerText = kategorija;
    document.getElementById('view-danger').innerText = opasnost;
    document.getElementById('view-img').src = "/static/slike/" + slika;
    document.getElementById('view-img').alt = "Ilustracija bića: " + ime;
    
    document.querySelectorAll('.creature-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
}

// NOVA FUNKCIJA: Konverzija ćirilice u latinicu za pretragu
function konvertujULatinicu(tekst) {
    const mapa = {
        'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'ђ': 'dj', 'е': 'e', 'ж': 'z', 'з': 'z', 'и': 'i', 'ј': 'j', 'к': 'k', 'л': 'l', 'љ': 'lj', 'м': 'm', 'н': 'n', 'њ': 'nj', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'ћ': 'c', 'у': 'u', 'ф': 'f', 'х': 'h', 'ц': 'c', 'č': 'c', 'dž': 'dz', 'š': 's',
        'А': 'A', 'Б': 'B', 'В': 'V', 'Г': 'G', 'Д': 'D', 'Ђ': 'Dj', 'Е': 'E', 'Ж': 'Z', 'З': 'Z', 'И': 'I', 'Ј': 'J', 'К': 'K', 'Л': 'L', 'Љ': 'Lj', 'М': 'M', 'Н': 'N', 'Њ': 'Nj', 'О': 'O', 'П': 'P', 'Р': 'R', 'С': 'S', 'Т': 'T', 'Ћ': 'C', 'У': 'U', 'Ф': 'F', 'Х': 'H', 'Ц': 'C', 'Č': 'C', 'Dž': 'Dz', 'Š': 'S'
    };
    return tekst.split('').map(karakter => mapa[karakter] || karakter).join('').toLowerCase();
}

// NOVA FUNKCIJA: Filtriranje liste uživo
function filtrirajBica() {
    let input = document.getElementById('live-search').value;
    let filter = konvertujULatinicu(input);
    let stavke = document.querySelectorAll('.creature-item');

    stavke.forEach(stavka => {
        let imeBica = stavka.getAttribute('data-ime');
        let imeNormalized = konvertujULatinicu(imeBica);

        if (imeNormalized.includes(filter)) {
            stavka.style.display = "";
        } else {
            stavka.style.display = "none";
        }
    });
}
</script>

</body>
</html>
