<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Mitoloska Arena - Ultra RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Kelly+Slab&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --hp-red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            /* EPSKA POZADINA */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; font-family: 'MedievalSharp', cursive;
            overflow-x: hidden;
        }

        .main-arena {
            display: flex; flex-direction: column; align-items: center; padding-bottom: 100px;
            min-height: 100vh;
        }

        .battle-zone {
            perspective: 1200px;
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 600px;
            margin-top: 20px;
        }

        .floor {
            position: absolute; width: 140%; height: 350px;
            background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            transform: rotateX(70deg); bottom: 50px;
            border-top: 1px solid rgba(212,175,55,0.3);
        }

        /* KARTE */
        .card-entity {
            width: 280px; height: 400px;
            background: rgba(10, 10, 10, 0.95); border: 4px solid var(--gold);
            border-radius: 15px; position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            margin: 0 50px; z-index: 10;
        }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .card-header { padding: 10px; text-align: center; font-size: 1.4em; color: var(--gold); border-bottom: 1px solid #333; }
        .card-frame { padding: 10px; height: 220px; }
        .card-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #444; }

        /* HP I UI */
        .unit-ui { position: absolute; top: -80px; width: 100%; }
        .hp-container { height: 14px; background: #000; border: 2px solid var(--gold); border-radius: 7px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #8b0000); transition: width 0.4s; }

        /* ANIMACIJE */
        .attack-p1 { animation: p1Dash 0.6s forwards; }
        .attack-p2 { animation: p2Dash 0.6s forwards; }
        @keyframes p1Dash { 0% { transform: translateX(0); } 40% { transform: translateX(350px) scale(1.1); z-index: 100; } 100% { transform: translateX(0); } }
        @keyframes p2Dash { 0% { transform: translateX(0); } 40% { transform: translateX(-350px) scale(1.1); z-index: 100; } 100% { transform: translateX(0); } }

        .shake { animation: shakeWorld 0.4s; }
        @keyframes shakeWorld { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-10px, 10px); } 75% { transform: translate(10px, -10px); } }

        .dmg-popup {
            position: absolute; font-size: 5em; font-weight: 900; color: #ffeb3b;
            text-shadow: 4px 4px 0 #000; animation: dmgRise 1s forwards; pointer-events: none; z-index: 500;
        }
        @keyframes dmgRise { 0% { opacity: 1; transform: scale(0.5) translateY(0); } 30% { transform: scale(1.3); } 100% { opacity: 0; transform: translateY(-200px); } }

        /* VICTORY OVERLAY */
        #victory-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        /* KONTROLE */
        .game-controls {
            display: flex; gap: 20px; background: rgba(0,0,0,0.9);
            padding: 25px; border-top: 2px solid var(--gold);
            width: 100%; justify-content: center; position: fixed; bottom: 0; z-index: 200;
        }

        .rpg-btn {
            background: linear-gradient(180deg, #d4af37 0%, #8b6d11 100%);
            color: black; border: 2px solid white; padding: 15px 50px;
            font-size: 1.5em; cursor: pointer; font-family: 'MedievalSharp'; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="main-arena" id="world">
    <h1 style="color: gold; font-size: 4em; text-shadow: 0 0 20px red; margin: 20px 0;">MEJDAN HEROJA</h1>
    
    <div class="battle-zone">
        <div class="floor"></div>

        <div class="card-entity floating" id="p1-entity">
            <div class="unit-ui">
                <div class="hp-container"><div id="p1-hp-fill" class="hp-fill"></div></div>
                <div id="p1-hp-val" style="text-align:center; margin-top:5px;">100/100</div>
            </div>
            <div class="card-header" id="p1-title">HEROJ 1</div>
            <div class="card-frame"><img id="p1-img" src="/static/slike/placeholder.png"></div>
            <div style="text-align:center; font-size: 2em; color: var(--gold);">⚔️ <span id="p1-atk-val">0</span></div>
            <div id="p1-pop-anchor" style="position: absolute; top: 30%; left: 40%;"></div>
        </div>

        <div style="font-size: 5em; color: gold; z-index: 5; text-shadow: 0 0 20px black;">VS</div>

        <div class="card-entity floating" id="p2-entity">
            <div class="unit-ui">
                <div class="hp-container"><div id="p2-hp-fill" class="hp-fill"></div></div>
                <div id="p2-hp-val" style="text-align:center; margin-top:5px;">100/100</div>
            </div>
            <div class="card-header" id="p2-title">HEROJ 2</div>
            <div class="card-frame"><img id="p2-img" src="/static/slike/placeholder.png"></div>
            <div style="text-align:center; font-size: 2em; color: var(--gold);">⚔️ <span id="p2-atk-val">0</span></div>
            <div id="p2-pop-anchor" style="position: absolute; top: 30%; left: 40%;"></div>
        </div>
    </div>
</div>

<div id="victory-overlay">
    <h2 style="color: gold; font-size: 5em; text-shadow: 0 0 30px gold;">POBEDNIK</h2>
    <div style="border: 6px solid gold; border-radius: 20px; background: #111; overflow: hidden; box-shadow: 0 0 80px gold;">
        <img id="winner-img" src="" style="width: 300px; height: 400px; object-fit: cover;">
        <div id="winner-name" style="background: gold; color: black; text-align: center; font-size: 2.5em; font-weight: bold; padding: 10px;">NAME</div>
    </div>
    <button class="rpg-btn" style="margin-top: 40px;" onclick="location.reload()">NOVI BOJ</button>
</div>

<div class="game-controls">
    <select id="sel1" onchange="initHero(1)" style="padding:10px; background:black; color:gold;">
        <option disabled selected>Izaberi prvog</option>
        {% for b in borci %}
        <option value="{{ b.ime }}" data-img="{{ b.slika }}" data-op="{{ b.opasnost }}">{{ b.ime }}</option>
        {% endfor %}
    </select>
    <button class="rpg-btn" onclick="startBattle()">ZAPOČNI BOJ</button>
    <select id="sel2" onchange="initHero(2)" style="padding:10px; background:black; color:gold;">
        <option disabled selected>Izaberi drugog</option>
        {% for b in borci %}
        <option value="{{ b.ime }}" data-img="{{ b.slika }}" data-op="{{ b.opasnost }}">{{ b.ime }}</option>
        {% endfor %}
    </select>
</div>

<script>
    let p1_stats = { hp: 100, max: 100, atk: 10 };
    let p2_stats = { hp: 100, max: 100, atk: 10 };

    function initHero(id) {
        let sel = document.getElementById('sel' + id);
        let opt = sel.options[sel.selectedIndex];
        let op = parseInt(opt.getAttribute('data-op'));
        document.getElementById('p' + id + '-title').innerText = opt.value;
        document.getElementById('p' + id + '-img').src = "/static/slike/" + opt.getAttribute('data-img');
        let hp = 100 + (op * 30);
        let atk = (op * 10) + 10;
        if(id === 1) { p1_stats = { hp: hp, max: hp, atk: atk }; }
        else { p2_stats = { hp: hp, max: hp, atk: atk }; }
        document.getElementById('p' + id + '-atk-val').innerText = atk;
        updateUI();
    }

    function triggerDmg(id, val) {
        let anchor = document.getElementById('p' + id + '-pop-anchor');
        let div = document.createElement('div');
        div.className = 'dmg-popup';
        div.innerText = val;
        anchor.appendChild(div);
        setTimeout(() => div.remove(), 1000);
    }

    function startBattle() {
        if(document.getElementById('sel1').selectedIndex == 0) return;
        let battleInterval = setInterval(() => {
            // P1 udara
            document.getElementById('p1-entity').classList.remove('floating');
            document.getElementById('p1-entity').classList.add('attack-p1');
            setTimeout(() => {
                let d1 = Math.floor(Math.random() * p1_stats.atk) + 5;
                p2_stats.hp -= d1;
                triggerDmg(2, d1);
                document.getElementById('world').classList.add('shake');
                updateUI();
                setTimeout(() => {
                    document.getElementById('world').classList.remove('shake');
                    document.getElementById('p1-entity').classList.remove('attack-p1');
                    document.getElementById('p1-entity').classList.add('floating');
                }, 200);
            }, 300);

            // P2 udara
            setTimeout(() => {
                if(p2_stats.hp > 0) {
                    document.getElementById('p2-entity').classList.remove('floating');
                    document.getElementById('p2-entity').classList.add('attack-p2');
                    setTimeout(() => {
                        let d2 = Math.floor(Math.random() * p2_stats.atk) + 5;
                        p1_stats.hp -= d2;
                        triggerDmg(1, d2);
                        document.getElementById('world').classList.add('shake');
                        updateUI();
                        setTimeout(() => {
                            document.getElementById('world').classList.remove('shake');
                            document.getElementById('p2-entity').classList.remove('attack-p2');
                            document.getElementById('p2-entity').classList.add('floating');
                        }, 200);
                    }, 300);
                }
            }, 800);

            if(p1_stats.hp <= 0 || p2_stats.hp <= 0) {
                clearInterval(battleInterval);
                setTimeout(() => {
                    let winName = p1_stats.hp > 0 ? document.getElementById('sel1').value : document.getElementById('sel2').value;
                    let winImg = p1_stats.hp > 0 ? document.getElementById('p1-img').src : document.getElementById('p2-img').src;
                    document.getElementById('winner-img').src = winImg;
                    document.getElementById('winner-name').innerText = winName.toUpperCase();
                    document.getElementById('victory-overlay').style.display = 'flex';
                }, 1000);
            }
        }, 1800);
    }

    function updateUI() {
        document.getElementById('p1-hp-fill').style.width = Math.max(0, (p1_stats.hp/p1_stats.max)*100) + "%";
        document.getElementById('p2-hp-fill').style.width = Math.max(0, (p2_stats.hp/p2_stats.max)*100) + "%";
        document.getElementById('p1-hp-val').innerText = Math.max(0, p1_stats.hp) + "/" + p1_stats.max;
        document.getElementById('p2-hp-val').innerText = Math.max(0, p2_stats.hp) + "/" + p2_stats.max;
    }
</script>
</body>
</html>
